openapi: "3.1.0"

info:
  title: ClimateInsight API
  version: "1.0.0"
  description: >
    Wissenschaftliche Klimadaten-Plattform. Alle Endpoints liefern
    normalisierte Klimadaten, Analyseergebnisse, Visualisierungen,
    Simulationen und KI-generierte Artikelentwürfe.
  contact:
    name: ClimateInsight Project
    url: https://github.com/climateinsight/climateinsight
  license:
    name: MIT

servers:
  - url: /api/v1
    description: Version 1

tags:
  - name: Ingestion
    description: Datenabruf und Normalisierung (Owner: Data Pipeline Team)
  - name: Analysis
    description: Klimaanalysen und Hypothesen (Owner: Climate Analysis Team)
  - name: Visualization
    description: Diagramme und Karten (Owner: Visualization Team)
  - name: Simulation
    description: Klimaszenarien und Projektionen (Owner: Simulation Team)
  - name: Knowledge
    description: Wissensbasis (Owner: Data Pipeline Team)
  - name: Explanation
    description: KI-Artikelentwürfe und Review (Owner: AI Explanation Team)
  - name: Exploration
    description: Interaktive Explorations-Endpoints (Owner: Frontend Team)

# ─────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────
security: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ─────────────────────────────────────────────
  # SHARED SCHEMAS
  # ─────────────────────────────────────────────
  schemas:

    SuccessMeta:
      type: object
      required: [timestamp, version, request_id]
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-03-05T10:00:00Z"
        version:
          type: string
          example: "1.0"
        request_id:
          type: string
          example: "req_abc123"

    ErrorBody:
      type: object
      required: [status, error, meta]
      properties:
        status:
          type: string
          enum: [error]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: "VALIDATION_ERROR"
            message:
              type: string
              example: "Ungültiger Datumsbereich"
            details:
              type: object
              additionalProperties: true
        meta:
          $ref: "#/components/schemas/SuccessMeta"

    DataPoint:
      type: object
      required: [timestamp, value, unit, quality_flag]
      properties:
        timestamp:
          type: string
          format: date-time
          example: "1980-01-01T00:00:00Z"
        value:
          type: number
          example: -0.16
        unit:
          type: string
          example: "°C"
        quality_flag:
          type: string
          enum: [good, estimated, questionable, missing]

    SourceReference:
      type: object
      required: [source_id, provider, citation, url, accessed_at]
      properties:
        source_id:
          type: string
          example: "nasa_giss_surface_temp_v4"
        provider:
          type: string
          example: "NASA"
        citation:
          type: string
          example: "GISTEMP Team (2024): GISS Surface Temperature Analysis (GISTEMP v4)."
        doi:
          type: string
          example: "10.7289/V5MGNM48"
        url:
          type: string
          format: uri
          example: "https://data.giss.nasa.gov/gistemp/"
        accessed_at:
          type: string
          format: date-time

    DatasetRef:
      type: object
      required: [id, variable, temporal_coverage, spatial_coverage, resolution, unit, source]
      properties:
        id:
          type: string
          example: "nasa_giss_surface_temp_v4"
        variable:
          $ref: "#/components/schemas/ClimateVariable"
        temporal_coverage:
          type: object
          required: [start, end]
          properties:
            start:
              type: string
              format: date
            end:
              type: string
              format: date
        spatial_coverage:
          type: string
          example: "global"
        resolution:
          type: string
          enum: [daily, monthly, annual]
        unit:
          type: string
          example: "°C"
        records:
          type: integer
          example: 1728
        citation:
          type: string
        doi:
          type: string
        last_updated:
          type: string
          format: date-time
        quality:
          type: string
          enum: [good, degraded, unknown]
        source:
          $ref: "#/components/schemas/SourceReference"

    ClimateVariable:
      type: string
      enum:
        - surface_temperature_anomaly
        - sea_level_change
        - sea_ice_extent
        - co2_concentration
        - arctic_ice_volume
        - precipitation_anomaly
        - ocean_heat_content

    JobStatus:
      type: string
      enum: [queued, running, completed, failed]

    ArticleStatus:
      type: string
      enum: [pending_review, in_review, approved, published, rejected]

    Hypothesis:
      type: object
      required: [id, statement, confidence, supporting_datasets, method]
      properties:
        id:
          type: string
          example: "hyp_001"
        statement:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        topic:
          type: string
        supporting_datasets:
          type: array
          items:
            type: string
        analysis_id:
          type: string
        method:
          type: string
        created_at:
          type: string
          format: date-time

    TimeRange:
      type: object
      required: [start, end]
      properties:
        start:
          type: string
          format: date
          example: "1960-01-01"
        end:
          type: string
          format: date
          example: "2025-01-01"

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ══════════════════════════════════════
  # INGESTION
  # ══════════════════════════════════════

  /ingestion/trigger:
    post:
      tags: [Ingestion]
      summary: Datenabruf starten
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_id]
              properties:
                source_id:
                  type: string
                  example: "nasa_giss_surface_temp"
                date_range:
                  $ref: "#/components/schemas/TimeRange"
                force_refresh:
                  type: boolean
                  default: false
      responses:
        "202":
          description: Job gestartet
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      job_id:
                        type: string
                        example: "job_abc123"
                      source_id:
                        type: string
                      status:
                        $ref: "#/components/schemas/JobStatus"
                      estimated_completion_seconds:
                        type: integer
                        example: 120
                  meta:
                    $ref: "#/components/schemas/SuccessMeta"
        "422":
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "503":
          description: Quelle nicht erreichbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /ingestion/jobs/{job_id}:
    get:
      tags: [Ingestion]
      summary: Job-Status abrufen
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job-Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      job_id:
                        type: string
                      source_id:
                        type: string
                      status:
                        $ref: "#/components/schemas/JobStatus"
                      started_at:
                        type: string
                        format: date-time
                      completed_at:
                        type: string
                        format: date-time
                        nullable: true
                      records_ingested:
                        type: integer
                      dataset_id:
                        type: string
                        nullable: true
                      quality_report:
                        type: object
                        properties:
                          missing_values:
                            type: integer
                          out_of_range_values:
                            type: integer
                          duplicate_records:
                            type: integer
                          overall_quality:
                            type: string
                            enum: [good, degraded, failed]
                      error:
                        type: string
                        nullable: true
        "404":
          description: Job nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /ingestion/datasets:
    get:
      tags: [Ingestion]
      summary: Verfügbare Datensätze auflisten
      parameters:
        - name: variable
          in: query
          schema:
            $ref: "#/components/schemas/ClimateVariable"
        - name: provider
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Datensatzliste
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      datasets:
                        type: array
                        items:
                          $ref: "#/components/schemas/DatasetRef"
                      total:
                        type: integer

  /ingestion/datasets/{dataset_id}/data:
    get:
      tags: [Ingestion]
      summary: Rohdaten eines Datensatzes abrufen
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
            maximum: 10000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Datenpunkte
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      dataset_id:
                        type: string
                      variable:
                        $ref: "#/components/schemas/ClimateVariable"
                      unit:
                        type: string
                      points:
                        type: array
                        items:
                          $ref: "#/components/schemas/DataPoint"
                      total_points:
                        type: integer
                      returned_points:
                        type: integer
                      source:
                        $ref: "#/components/schemas/SourceReference"
        "404":
          description: Datensatz nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /ingestion/sources:
    get:
      tags: [Ingestion]
      summary: Konfigurierte Datenquellen auflisten
      responses:
        "200":
          description: Quellenliste
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      sources:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            provider:
                              type: string
                            variables:
                              type: array
                              items:
                                $ref: "#/components/schemas/ClimateVariable"
                            update_frequency:
                              type: string
                            status:
                              type: string
                              enum: [active, inactive, error]
                            last_successful_fetch:
                              type: string
                              format: date-time
                              nullable: true

  # ══════════════════════════════════════
  # ANALYSIS
  # ══════════════════════════════════════

  /analysis/run:
    post:
      tags: [Analysis]
      summary: Klimaanalyse starten
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dataset_id, analysis_type]
              properties:
                dataset_id:
                  type: string
                  example: "nasa_giss_surface_temp_v4"
                analysis_type:
                  type: string
                  enum: [trend, anomaly, correlation, decompose, forecast]
                parameters:
                  type: object
                  properties:
                    method:
                      type: string
                      enum: [linear, polynomial, loess]
                      default: linear
                    confidence_level:
                      type: number
                      default: 0.95
                    time_range:
                      $ref: "#/components/schemas/TimeRange"
      responses:
        "202":
          description: Analyse gestartet
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      analysis_id:
                        type: string
                        example: "ana_xyz789"
                      status:
                        $ref: "#/components/schemas/JobStatus"
                      estimated_seconds:
                        type: integer
        "422":
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /analysis/{analysis_id}:
    get:
      tags: [Analysis]
      summary: Analyseergebnis abrufen
      parameters:
        - name: analysis_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Analyseergebnis
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      analysis_id:
                        type: string
                      status:
                        $ref: "#/components/schemas/JobStatus"
                      dataset_id:
                        type: string
                      analysis_type:
                        type: string
                      result:
                        type: object
                        description: Inhalt variiert je nach analysis_type
                        additionalProperties: true
                      hypotheses:
                        type: array
                        items:
                          $ref: "#/components/schemas/Hypothesis"
                      methodology:
                        type: object
                        properties:
                          method:
                            type: string
                          library:
                            type: string
                          reference:
                            type: string
                      computed_at:
                        type: string
                        format: date-time
        "404":
          description: Analyse nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /analysis/hypotheses:
    get:
      tags: [Analysis]
      summary: Alle Hypothesen auflisten
      parameters:
        - name: topic
          in: query
          schema:
            type: string
        - name: min_confidence
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
        - name: dataset_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Hypothesenliste
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      hypotheses:
                        type: array
                        items:
                          $ref: "#/components/schemas/Hypothesis"
                      total:
                        type: integer

  /analysis/correlate:
    post:
      tags: [Analysis]
      summary: Kreuzkorrelation zweier Datensätze
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dataset_a, dataset_b]
              properties:
                dataset_a:
                  type: string
                dataset_b:
                  type: string
                time_range:
                  $ref: "#/components/schemas/TimeRange"
                max_lag_months:
                  type: integer
                  default: 24
      responses:
        "202":
          description: Korrelationsanalyse gestartet
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      analysis_id:
                        type: string
                      status:
                        $ref: "#/components/schemas/JobStatus"

  # ══════════════════════════════════════
  # VISUALIZATION
  # ══════════════════════════════════════

  /viz/create:
    post:
      tags: [Visualization]
      summary: Visualisierung erstellen
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [viz_type, dataset_ids]
              properties:
                viz_type:
                  type: string
                  enum: [timeseries, map, scatter, correlation, bar]
                dataset_ids:
                  type: array
                  items:
                    type: string
                analysis_id:
                  type: string
                  nullable: true
                config:
                  type: object
                  properties:
                    x_axis:
                      type: string
                    y_axis:
                      type: string
                    time_range:
                      $ref: "#/components/schemas/TimeRange"
                    show_trend:
                      type: boolean
                      default: false
                    show_confidence_band:
                      type: boolean
                      default: false
                    color_scheme:
                      type: string
                      enum: [diverging_rdbu, sequential_blue, sequential_orange]
                    title:
                      type: string
                    show_source:
                      type: boolean
                      default: true
      responses:
        "201":
          description: Visualisierung erstellt
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      viz_id:
                        type: string
                        example: "viz_def456"
                      viz_type:
                        type: string
                      spec_format:
                        type: string
                        enum: [vega-lite]
                      spec:
                        type: object
                        additionalProperties: true
                      embed_url:
                        type: string
                      thumbnail_url:
                        type: string
                      export_urls:
                        type: object
                        properties:
                          svg:
                            type: string
                          png:
                            type: string
                          csv:
                            type: string
                      created_at:
                        type: string
                        format: date-time

  /viz/{viz_id}:
    get:
      tags: [Visualization]
      summary: Visualisierung abrufen
      parameters:
        - name: viz_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Visualisierungsdaten
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /viz/{viz_id}/export:
    get:
      tags: [Visualization]
      summary: Visualisierung exportieren
      parameters:
        - name: viz_id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [svg, png, csv]
        - name: width
          in: query
          schema:
            type: integer
            default: 1200
        - name: height
          in: query
          schema:
            type: integer
            default: 600
      responses:
        "200":
          description: Exportdatei
          content:
            image/svg+xml:
              schema:
                type: string
            image/png:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string

  /viz/templates:
    get:
      tags: [Visualization]
      summary: Visualisierungsvorlagen auflisten
      responses:
        "200":
          description: Vorlagenliste
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      templates:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            viz_type:
                              type: string
                            description:
                              type: string
                            default_config:
                              type: object
                              additionalProperties: true

  # ══════════════════════════════════════
  # SIMULATION
  # ══════════════════════════════════════

  /simulation/scenarios:
    get:
      tags: [Simulation]
      summary: Vordefinierte Szenarien auflisten
      responses:
        "200":
          description: Szenarienliste
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      scenarios:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              example: "rcp_2_6"
                            name:
                              type: string
                            description:
                              type: string
                            source:
                              type: string
                            parameters:
                              type: object
                              additionalProperties: true

  /simulation/run:
    post:
      tags: [Simulation]
      summary: Simulation starten
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [variable]
              properties:
                scenario_id:
                  type: string
                  example: "rcp_4_5"
                custom_parameters:
                  type: object
                  additionalProperties: true
                base_dataset_id:
                  type: string
                time_horizon_years:
                  type: integer
                  default: 75
                  maximum: 200
                variable:
                  $ref: "#/components/schemas/ClimateVariable"
      responses:
        "202":
          description: Simulation gestartet
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      simulation_id:
                        type: string
                      status:
                        $ref: "#/components/schemas/JobStatus"
                      estimated_seconds:
                        type: integer

  /simulation/{simulation_id}:
    get:
      tags: [Simulation]
      summary: Simulationsergebnis abrufen
      parameters:
        - name: simulation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Simulationsergebnis
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      simulation_id:
                        type: string
                      status:
                        $ref: "#/components/schemas/JobStatus"
                      scenario_id:
                        type: string
                      result:
                        type: object
                        properties:
                          projection_series:
                            type: array
                            items:
                              type: object
                              properties:
                                timestamp:
                                  type: string
                                  format: date-time
                                value_median:
                                  type: number
                                value_lower_95:
                                  type: number
                                value_upper_95:
                                  type: number
                                unit:
                                  type: string
                          key_milestones:
                            type: array
                            items:
                              type: object
                              properties:
                                year:
                                  type: integer
                                event:
                                  type: string
                                probability:
                                  type: number
                          simplification_notes:
                            type: array
                            items:
                              type: string
                      computed_at:
                        type: string
                        format: date-time
        "404":
          description: Simulation nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /simulation/parameters:
    get:
      tags: [Simulation]
      summary: Verfügbare Simulationsparameter
      responses:
        "200":
          description: Parameterliste
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      parameters:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            label:
                              type: string
                            type:
                              type: string
                              enum: [float, int, string, boolean]
                            min:
                              type: number
                            max:
                              type: number
                            default:
                              oneOf:
                                - type: number
                                - type: string
                                - type: boolean
                            unit:
                              type: string

  # ══════════════════════════════════════
  # KNOWLEDGE BASE
  # ══════════════════════════════════════

  /knowledge/entries:
    post:
      tags: [Knowledge]
      summary: Wissensbasis-Eintrag erstellen
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content, topic]
              properties:
                title:
                  type: string
                content:
                  type: string
                topic:
                  type: string
                supporting_analyses:
                  type: array
                  items:
                    type: string
                supporting_datasets:
                  type: array
                  items:
                    type: string
                sources:
                  type: array
                  items:
                    $ref: "#/components/schemas/SourceReference"
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Eintrag erstellt
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      entry_id:
                        type: string
                        example: "ke_001"
                      created_at:
                        type: string
                        format: date-time

  /knowledge/search:
    get:
      tags: [Knowledge]
      summary: Semantische Suche in der Wissensbasis
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: topic
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Suchergebnisse
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            entry_id:
                              type: string
                            title:
                              type: string
                            summary:
                              type: string
                            topic:
                              type: string
                            relevance_score:
                              type: number
                            tags:
                              type: array
                              items:
                                type: string
                      total:
                        type: integer

  /knowledge/entries/{entry_id}:
    get:
      tags: [Knowledge]
      summary: Einzelnen Wissensbasis-Eintrag abrufen
      parameters:
        - name: entry_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wissensbasis-Eintrag
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      entry_id:
                        type: string
                      title:
                        type: string
                      content:
                        type: string
                      topic:
                        type: string
                      supporting_analyses:
                        type: array
                        items:
                          type: string
                      supporting_datasets:
                        type: array
                        items:
                          type: string
                      sources:
                        type: array
                        items:
                          $ref: "#/components/schemas/SourceReference"
                      tags:
                        type: array
                        items:
                          type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        "404":
          description: Eintrag nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  # ══════════════════════════════════════
  # AI EXPLANATION
  # ══════════════════════════════════════

  /explain/generate:
    post:
      tags: [Explanation]
      summary: Artikelentwurf generieren
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic]
              properties:
                topic:
                  type: string
                knowledge_entry_ids:
                  type: array
                  items:
                    type: string
                analysis_ids:
                  type: array
                  items:
                    type: string
                audience:
                  type: string
                  enum: [general, expert]
                  default: general
                language:
                  type: string
                  enum: [de, en]
                  default: de
                target_word_count:
                  type: integer
                  default: 800
      responses:
        "202":
          description: Generierung gestartet — Status ist immer pending_review
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      article_id:
                        type: string
                        example: "art_ghi012"
                      status:
                        type: string
                        enum: [pending_review]
                        description: "IMMER pending_review. Niemals automatisch veröffentlichen."

  /explain/articles/{article_id}:
    get:
      tags: [Explanation]
      summary: Artikelentwurf abrufen
      parameters:
        - name: article_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artikelentwurf
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      article_id:
                        type: string
                      status:
                        $ref: "#/components/schemas/ArticleStatus"
                      title:
                        type: string
                      content:
                        type: string
                      summary:
                        type: string
                      key_findings:
                        type: array
                        items:
                          type: string
                      sources:
                        type: array
                        items:
                          $ref: "#/components/schemas/SourceReference"
                      audience:
                        type: string
                        enum: [general, expert]
                      language:
                        type: string
                      word_count:
                        type: integer
                      generated_at:
                        type: string
                        format: date-time
                      reviewed_by:
                        type: string
                        nullable: true
                      published_at:
                        type: string
                        format: date-time
                        nullable: true
        "404":
          description: Artikel nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /explain/articles/{article_id}/review:
    post:
      tags: [Explanation]
      summary: Review-Entscheidung einreichen
      security:
        - BearerAuth: []
      parameters:
        - name: article_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, reviewer_id]
              properties:
                decision:
                  type: string
                  enum: [approved, rejected, revision_required]
                notes:
                  type: string
                reviewer_id:
                  type: string
      responses:
        "200":
          description: Review gespeichert
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      article_id:
                        type: string
                      status:
                        $ref: "#/components/schemas/ArticleStatus"
                      reviewed_by:
                        type: string
                      reviewed_at:
                        type: string
                        format: date-time
        "403":
          description: Keine Berechtigung
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /explain/articles:
    get:
      tags: [Explanation]
      summary: Artikelliste abrufen
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ArticleStatus"
        - name: language
          in: query
          schema:
            type: string
        - name: topic
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Artikelliste
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      articles:
                        type: array
                        items:
                          type: object
                          properties:
                            article_id:
                              type: string
                            title:
                              type: string
                            summary:
                              type: string
                            status:
                              $ref: "#/components/schemas/ArticleStatus"
                            language:
                              type: string
                            generated_at:
                              type: string
                              format: date-time
                      total:
                        type: integer

  # ══════════════════════════════════════
  # EXPLORATION
  # ══════════════════════════════════════

  /explore/compare:
    post:
      tags: [Exploration]
      summary: Mehrere Variablen vergleichen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dataset_ids]
              properties:
                dataset_ids:
                  type: array
                  minItems: 1
                  maxItems: 5
                  items:
                    type: string
                time_range:
                  $ref: "#/components/schemas/TimeRange"
                normalize:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Vergleichsdaten
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      comparison_id:
                        type: string
                      series:
                        type: array
                        items:
                          type: object
                          properties:
                            dataset_id:
                              type: string
                            variable:
                              $ref: "#/components/schemas/ClimateVariable"
                            unit:
                              type: string
                            normalized:
                              type: boolean
                            points:
                              type: array
                              items:
                                $ref: "#/components/schemas/DataPoint"
                      auto_correlation:
                        type: object
                        nullable: true
                        properties:
                          pearson_r:
                            type: number
                          interpretation:
                            type: string

  /explore/share:
    post:
      tags: [Exploration]
      summary: Explorations-Zustand speichern und teilen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Share-Link erstellt
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      share_token:
                        type: string
                        example: "shr_abc123"
                      share_url:
                        type: string
                        format: uri
                      expires_at:
                        type: string
                        format: date-time
                        nullable: true

  /explore/share/{token}:
    get:
      tags: [Exploration]
      summary: Geteilten Explorations-Zustand laden
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Gespeicherter Zustand
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: object
                    properties:
                      state:
                        type: object
                        additionalProperties: true
        "404":
          description: Token nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
